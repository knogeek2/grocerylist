<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>

    <h1>Orders</h1>

    <!-- Recent Orders Sidebar -->
    <section id="recent-orders">
        <h2>Recent Orders</h2>
        <div id="recent-orders-container">
            <p class="recent-loading">Loading recent orders…</p>
        </div>
    </section>

    <!-- Order Details -->
    <section id="order-details">

        <h2>Order Details</h2>

        <div class="order-header">

            <label>
                Order #
                <input type="text" name="orderNumber" readonly>
            </label>

            <label>
                Vendor
                <input type="text" name="vendor">
            </label>

            <label>
                Vendor Order #
                <input type="text" name="vendorOrderNumber">
            </label>

            <label>
                Order Date
                <input type="date" name="orderDate">
            </label>

            <label>
                Payment Method
                <input type="text" name="paymentMethod">
            </label>

            <label>
                Shipping Method
                <input type="text" name="shippingMethod">
            </label>

            <label>
                Tracking Number
                <input type="text" name="trackingNumber">
            </label>

            <label>
                Order Type
                <input type="text" name="orderType" readonly>
            </label>

        </div>

        <h3>Items</h3>
        <div id="order-items-container">
            <p class="recent-loading">Select an order to view items.</p>
        </div>

    </section>

    <!-- Load JS Modules -->
    <script type="module">
        import { order } from "./js/order.js";
        import { setDefaultOrderDate } from "./js/global.js";

        // Initialize page
        setDefaultOrderDate();
        order.initPage();
    </script>

</body>
</html>
