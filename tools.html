<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Your existing stylesheet -->
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <h1>Tools</h1>
    <h2>CSV → JSON Converter</h2>

    <div class="form-row">
        <label for="csv-file">Choose CSV File</label>
        <input type="file" id="csv-file" accept=".csv">
    </div>

    <div class="form-row">
        <label for="csv-input">CSV Input</label>
        <textarea id="csv-input" placeholder="Paste CSV here"></textarea>
    </div>

    <button id="convert-btn">Convert to JSON</button>

    <div class="form-row">
        <label for="json-output">JSON Output</label>
        <textarea id="json-output" readonly></textarea>
    </div>

    <button id="download-btn">Download JSON</button>
    <button id="clear-btn">Clear</button>

    <script src="js/tools.js"></script>
</body>
</html>
